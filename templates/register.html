{% extends "base.html" %}
{% block title %}Regisztráció - UPDH{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-bolt"></i>
            </div>
            <h1>Regisztráció</h1>
            <p>Készíts egy új fiókot</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email cím</label>
                <input type="email" name="email" required
                       placeholder="email@pelda.hu"
                       autocomplete="email">
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> Meghívó kód</label>
                <input type="text" name="invite_code" required
                       placeholder="Illeszd be a kódod ide"
                       autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Jelszó</label>
                <input type="password" name="password" required
                       placeholder="••••••••"
                       autocomplete="new-password">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Jelszó megerősítése</label>
                <input type="password" name="confirm_password" required
                       placeholder="••••••••"
                       autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                <i class="fas fa-user-plus"></i> Regisztráció
            </button>
        </form>
        <div class="auth-footer">
            <p>Már van fiókod?
                <a href="{{ url_for('login') }}">Jelentkezz be</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
